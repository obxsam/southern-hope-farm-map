<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Southern Hope Farm Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Georgia,serif;background:#111a0e;color:#e8dfc0;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto;}
#hdr{padding:10px 14px 7px;background:#0d130a;border-bottom:1px solid #243018;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#hdr .ttl{font-size:16px;font-weight:700;color:#d4b96a;}
#hdr .sub{font-size:10px;color:#506040;}
#map-wrap{flex-shrink:0;padding:5px 5px 2px;}
#map-wrap svg{width:100%;display:block;border-radius:8px;border:1px solid #243018;}
#detail{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:24px;text-align:center;}
#empty .ico{font-size:36px;}
#empty p{font-size:14px;color:#8a9060;line-height:1.6;}
#empty small{font-size:11px;color:#405030;}
#area-view,#animal-view{padding:0 12px 32px;display:none;}
.back-bar{display:flex;align-items:center;gap:8px;padding:9px 0 8px;border-bottom:1px solid #243018;margin-bottom:12px;position:sticky;top:0;background:#111a0e;z-index:10;}
.back-btn{background:#1a2a12;border:1px solid #3a5a22;color:#80a050;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;}
.area-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.view-title{font-size:16px;font-weight:700;color:#d4b96a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-edit{background:#243018;border:1px solid #4a7a22;color:#90c050;border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;}
.btn-save{background:#1a3a14;border:1px solid #3a7a22;color:#70c050;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:Georgia,serif;}
.btn-cancel{background:#2a1814;border:1px solid #6a2a1a;color:#d06050;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:Georgia,serif;}
.btn-del{background:#2a1814;border:1px solid #6a2a1a;color:#d06050;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:Georgia,serif;}
.sec-h{font-size:10px;font-weight:700;letter-spacing:1px;color:#607048;text-transform:uppercase;margin-bottom:8px;}
.animal-card{display:flex;align-items:center;gap:12px;background:#182010;border-radius:10px;padding:12px 14px;margin-bottom:9px;border:1px solid #2a3818;cursor:pointer;}
.animal-card:active{background:#202e16;}
.ani-emo{font-size:26px;flex-shrink:0;}
.ani-thumb{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid #3a5a22;flex-shrink:0;background:#141c0e;}
.ani-info{flex:1;}
.ani-name{font-size:15px;color:#d4c078;font-weight:700;}
.ani-sub{font-size:12px;color:#607048;margin-top:2px;}
.ani-arr{font-size:20px;color:#405030;}
.empty-box{display:flex;align-items:center;justify-content:center;background:#141c0e;border-radius:8px;border:1px dashed #2a3018;color:#3a4028;font-size:13px;margin-bottom:12px;padding:14px;font-style:italic;}
.add-btn{width:100%;background:#141e10;border:1px dashed #3a5a22;color:#70a050;border-radius:8px;padding:11px;font-size:14px;cursor:pointer;font-family:Georgia,serif;}
.area-notes{background:#181e10;border-radius:8px;padding:10px 12px;border:1px solid #2a3018;font-size:14px;color:#c0b070;line-height:1.7;white-space:pre-wrap;margin-bottom:8px;}
.photo-img{width:100%;height:200px;object-fit:cover;border-radius:10px;border:1px solid #2a3818;margin-bottom:14px;display:block;}
.photo-ph{width:100%;height:90px;background:#141c0e;border-radius:10px;border:1px dashed #2a3018;display:flex;align-items:center;justify-content:center;color:#3a4028;font-size:13px;font-style:italic;margin-bottom:14px;}
.feed-block{background:#182010;border-radius:8px;padding:10px 12px;border:1px solid #2a3818;margin-bottom:9px;}
.feed-lbl{font-size:10px;color:#6a8048;margin-bottom:4px;font-weight:700;letter-spacing:.5px;}
.feed-txt{font-size:14px;color:#c0b070;line-height:1.6;white-space:pre-wrap;}
.feed-none{color:#3a4028;font-style:italic;}
.notes-view{background:#181e10;border-radius:8px;padding:10px 12px;border:1px solid #2a3018;font-size:14px;color:#c0b070;line-height:1.7;white-space:pre-wrap;}
input,textarea{width:100%;background:#182010;border:1px solid #2a3818;color:#d0c080;border-radius:8px;padding:10px 12px;font-size:15px;font-family:Georgia,serif;outline:none;display:block;-webkit-appearance:none;}
textarea{resize:vertical;line-height:1.6;}
.field-lbl{font-size:11px;color:#7a8050;margin-bottom:5px;margin-top:12px;}
.tab-row{display:flex;gap:7px;margin-bottom:8px;}
.tab{background:#181e10;border:1px solid #2a3018;color:#5a6040;border-radius:6px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:Georgia,serif;}
.tab.on{background:#243018;border-color:#4a7a28;color:#90c050;}
.btn-file{width:100%;background:#182010;border:1px solid #3a5a22;color:#70a050;border-radius:8px;padding:10px;font-size:14px;cursor:pointer;font-family:Georgia,serif;margin-bottom:8px;}
.divider{height:1px;background:#243018;margin:12px 0;}

html{
  width:100%;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}

body{
  min-height:100vh;
  min-height:100dvh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;
  user-select:none;
}

input, textarea, select{
  font-size:16px !important;
  -webkit-user-select:text;
  user-select:text;
}

button, .back-btn, .btn-edit, .btn-save, .btn-cancel, .btn-del, .animal-card, svg *{
  touch-action:manipulation;
  cursor:pointer;
}

#detail, #area-view, #animal-view{
  -webkit-overflow-scrolling:touch;
}

@supports (-webkit-touch-callout:none){
  body{
    height:100dvh;
  }
}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="ios-install-hint" style="display:none;position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:9999;background:#182010;border:1px solid #3a5a22;color:#e8dfc0;border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.4;box-shadow:0 4px 18px rgba(0,0,0,.45);">
  To use this like an iPhone app: tap <b>Share</b> → <b>Add to Home Screen</b>.
  <button onclick="document.getElementById('ios-install-hint').style.display='none'" style="float:right;margin-left:8px;padding:4px 8px;">OK</button>
</div>


<div id="hdr">
  <span style="font-size:20px">🌾</span>
  <div><div class="ttl">Southern Hope Farm Map</div><div class="sub" id="hdr-sub">tap an area to view animals</div></div>
</div>
<div id="map-wrap">
  <svg id="farm-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
</div>
<div id="detail">
  <div id="empty">
    <div class="ico">👆</div>
    <p>Tap any area on the map to see the animals and feed schedule.</p>
    <small>🟡 dot = animals present</small>
  </div>
  <div id="area-view"></div>
  <div id="animal-view"></div>
</div>
<input type="file" id="file-input" accept="image/*" style="display:none">

<script>
// ── AREAS ─────────────────────────────────────────────────────────────────────
// Coords from Visio VSDX: Y-flipped SVG %, bounding box left=214,bottom=-348,W=6857,H=8317
// Field 6 is a rotated reverse-L polygon (Angle=-90deg in Visio)
const AREAS = {
  field1:       {label:"Field 1",         type:"r", x:66.94,y:0.00, w:13.50,h:59.73, color:"#3a6830"},
  field2:       {label:"Field 2",         type:"r", x:51.38,y:0.05, w:15.75,h:55.36, color:"#3a6830"},
  field3:       {label:"Field 3",         type:"r", x:35.63,y:0.05, w:15.75,h:55.36, color:"#3a6830"},
  field4:       {label:"Field 4",         type:"r", x:19.88,y:0.05, w:15.75,h:55.36, color:"#3a6830"},
  field5:       {label:"Field 5",         type:"r", x:0.63, y:0.05, w:19.25,h:55.36, color:"#3a6830"},
  field6:       {label:"Field 6",         type:"p",
                 pts:"0.63,55.99 0.63,92.06 27.67,92.06 27.67,69.70 63.63,69.70 63.63,55.99",
                 lx:10, ly:75, color:"#436e38"},
  field7:       {label:"Field 7",         type:"r", x:73.26,y:69.84, w:7.50, h:22.44, color:"#436e38"},
  lesson_field: {label:"Lesson Field",    type:"r", x:65.76,y:69.84, w:7.50, h:22.44, color:"#4e6e32"},
  dry_lot:      {label:"Dry Lot",         type:"r", x:37.63,y:63.95, w:26.25,h:5.90,  color:"#8a7040"},
  chickens_pigs:{label:"Chickens & Pigs", type:"r", x:46.13,y:69.84, w:10.63,h:6.99,  color:"#a85e10"},
  keegan_tater: {label:"Keegan & Tater",  type:"r", x:73.13,y:71.83, w:5.25, h:4.00,  color:"#7a5c0e"},
  barley:       {label:"Barley",          type:"r", x:69.38,y:66.83, w:5.25, h:3.00,  color:"#7a5c0e"},
  barn:         {label:"Barn",            type:"r", x:63.63,y:56.14, w:6.50, h:8.73,  color:"#8b2020"},
  shed_45:      {label:"Shed 4/5",        type:"r", x:10.74,y:53.16, w:10.53,h:2.26,  color:"#5a4a28"},
  shed_23:      {label:"Shed 2/3",        type:"r", x:47.72,y:53.16, w:7.50, h:2.26,  color:"#5a4a28"},
  house:        {label:"House",           type:"r", x:30.38,y:76.96, w:15.75,h:5.98,  color:"#4a3e2a"},
  arena:        {label:"Arena",           type:"r", x:52.63,y:84.58, w:7.50, h:5.98,  color:"#7a6a40"},
};

// ── STORE (loaded from Supabase) ─────────────────────────────────────────────
let nextId=1;
const DEFAULT_PHOTOS = {};
function slugName(n){return String(n||"").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");}
const A=(name,am,pm,notes)=>({id:nextId++,name,imageUrl:DEFAULT_PHOTOS[slugName(name)]||"",feedAM:am||"",feedPM:pm||"",notes:notes||""});

let store={
  field1:       {notes:"",   animals:[
                  A("Maverick","1 lb hp","1 lb hp","")]},
  field2:       {notes:"",   animals:[
                  A("Bravo","2 lbs hp","2 lbs hp",""),
                  A("Pedro","¼ lb hp","¼ lb hp","")]},
  field3:       {notes:"",   animals:[
                  A("Dandy","½ lb hp","½ lb hp",""),
                  A("Tally","3 lbs Sentinel DRY","3 lbs Sentinel DRY","⚠️ DRY feed only")]},
  field4:       {notes:"",   animals:[
                  A("Jasmine","¼ lb hp","","AM only")]},
  field5:       {notes:"⭐ Soak the minis @ PM feed — no supps!", animals:[
                  A("Dash","¼ lb hp","","AM only"),
                  A("Emmett","¼ lb hp","","AM only"),
                  A("Kenai","Clear scoop teff","","AM only"),
                  A("Zander","2 lbs hp","2 lbs hp","")]},
  field6:       {notes:"",   animals:[
                  A("Pandora","¼ lb hp","","AM only"),
                  A("Maiya","¼ lb hp","","AM only"),
                  A("Lucy","¼ lb hp","","AM only"),
                  A("Poppi","½ lb hp","½ lb hp","")]},
  field7:       {notes:"",   animals:[
                  A("Keegan","Clear scoop teff","Clear scoop teff",""),
                  A("Tater","Clear scoop teff","Clear scoop teff","")]},
  lesson_field: {notes:"",   animals:[]},
  dry_lot:      {notes:"⭐ Soak the minis @ PM feed — no supps!", animals:[
                  A("Annabelle","","6 lbs hp + 1 lb cubes","PM only"),
                  A("Bailey","Clear scoop teff","","AM only"),
                  A("Bridget","Clear scoop teff","","AM only")]},
  chickens_pigs:{notes:"",   animals:[]},
  keegan_tater: {notes:"",   animals:[]},
  barley:       {notes:"",   animals:[
                  A("Barley","1 lb cubes","1 lb cubes","AM + PM")]},
  barn:         {notes:"",   animals:[]},
  shed_45:      {notes:"",   animals:[]},
  shed_23:      {notes:"",   animals:[]},
  house:        {notes:"",   animals:[]},
  arena:        {notes:"",   animals:[]},
};

// ── STATE ──────────────────────────────────────────────────────────────────────
let selArea=null, selAnimalId=null, mode="home", editBuf={}, imgTab="url";

// ── MAP ────────────────────────────────────────────────────────────────────────
const NS="http://www.w3.org/2000/svg";
function mk(tag,att,par){const e=document.createElementNS(NS,tag);Object.entries(att).forEach(([k,v])=>e.setAttribute(k,v));par&&par.appendChild(e);return e;}
function mt(s,att,par){const e=mk("text",att,par);e.textContent=s;e.style.pointerEvents="none";e.style.userSelect="none";return e;}
function lc(hex,a=55){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}

function buildMap(){
  const svg=document.getElementById("farm-svg");
  svg.innerHTML="";
  // Background
  mk("rect",{x:0,y:0,width:100,height:100,fill:"#0e1608"},svg);
  // White Horse Drive road
  mk("rect",{x:0,y:93.2,width:100,height:6.8,fill:"#26221a"},svg);
  mt("WHITE HORSE DRIVE",{"text-anchor":"middle","font-size":"2","font-family":"Georgia,serif",fill:"#6a6040",x:50,y:97.2},svg);

  Object.entries(AREAS).forEach(([id,a])=>{
    const isSel=selArea===id;
    const hasAni=store[id]&&store[id].animals.length>0;
    const fill=isSel?lc(a.color):a.color;
    const stroke=isSel?"#f0d050":"#080e04";
    const sw=isSel?0.65:0.2;
    const tf=isSel?"#fffae0":"#e0d490";
    const fw=isSel?"bold":"normal";
    const g=mk("g",{cursor:"pointer"},svg);

    if(a.type==="p"){
      // Polygon (Field 6 L-shape)
      mk("polygon",{points:a.pts,fill,stroke,"stroke-width":sw},g);
      const fs="2.4";
      const ta={"text-anchor":"middle","font-size":fs,fill:tf,"font-family":"Georgia,serif","font-weight":fw};
      mt("Field 6",{...ta,x:a.lx,y:a.ly},g);
    } else {
      // Rectangle
      mk("rect",{x:a.x,y:a.y,width:a.w,height:a.h,fill,stroke,"stroke-width":sw,rx:0.4},g);
      const mx=a.x+a.w/2, my=a.y+a.h/2;
      const fs=a.w<7?"1.5":a.w<11?"1.9":a.w<16?"2.3":"2.7";
      const ta={"text-anchor":"middle","font-size":fs,fill:tf,"font-family":"Georgia,serif","font-weight":fw};
      const words=a.label.split(" ");
      if(words.length===1)mt(a.label,{...ta,x:mx,y:my+0.7},g);
      else if(words.length===2){mt(words[0],{...ta,x:mx,y:my-0.5},g);mt(words[1],{...ta,x:mx,y:my+2.1},g);}
      else{const sf=a.w<10?"1.4":"1.8";mt(words[0]+" "+words[1],{...ta,x:mx,y:my-0.8,"font-size":sf},g);mt(words.slice(2).join(" "),{...ta,x:mx,y:my+1.4,"font-size":sf},g);}
    }

    if(hasAni){
      // Gold dot indicator — place in top-right of bounding area
      let dx,dy;
      if(a.type==="p"){dx=63,dy=56.9;}
      else{dx=a.x+a.w-1.5;dy=a.y+1.5;}
      mk("circle",{cx:dx,cy:dy,r:1.2,fill:"#f0d050",stroke:"#080e04","stroke-width":0.2},g);
    }

    g.addEventListener("click",()=>goArea(id));
    g.addEventListener("touchstart",e=>{e.preventDefault();goArea(id);},{passive:false});
  });

  // Compass
  mk("circle",{cx:95.5,cy:5,r:3.5,fill:"#0a1008",stroke:"#3a4a28","stroke-width":0.3},svg);
  mt("N",{"text-anchor":"middle","font-size":"3.2","font-family":"Georgia,serif",fill:"#c4a950",x:95.5,y:6.3},svg);
}

// ── PANELS ─────────────────────────────────────────────────────────────────────
function showPanel(w){
  document.getElementById("empty").style.display      =w==="home"?"flex":"none";
  document.getElementById("area-view").style.display  =w==="area"?"block":"none";
  document.getElementById("animal-view").style.display=w==="animal"?"block":"none";
}
function scrollTop(){document.getElementById("detail").scrollTop=0;}

// ── NAVIGATION ─────────────────────────────────────────────────────────────────
function goHome(){selArea=null;selAnimalId=null;mode="home";buildMap();showPanel("home");document.getElementById("hdr-sub").textContent="tap an area to view animals";}
function goArea(id){selArea=id;selAnimalId=null;mode="area";buildMap();renderArea();scrollTop();}
function goAnimalView(id){selAnimalId=id;mode="animal-view";renderAnimal();scrollTop();}

// ── AREA VIEW ──────────────────────────────────────────────────────────────────
function renderArea(){
  const a=AREAS[selArea], s=store[selArea];
  document.getElementById("hdr-sub").textContent=a.label;
  const isNotesEdit=mode==="area-notes-edit";
  let h="";

  h+=`<div class="back-bar">
    <div class="area-dot" style="background:${a.color}"></div>
    <div class="view-title">${esc(a.label)}</div>
    ${isNotesEdit
      ?`<button class="btn-save" onclick="saveAreaNotes()">✓ Save</button><button class="btn-cancel" style="margin-left:4px" onclick="cancelAreaNotes()">✕</button>`
      :`<button class="back-btn" onclick="goHome()">✕ Close</button>`}
  </div>`;

  // Animals
  h+=`<div class="sec-h">Animals in this area</div>`;
  if(!s.animals.length){
    h+=`<div class="empty-box">No animals yet</div>`;
  } else {
    s.animals.forEach(an=>{
      const hasFeed=an.feedAM||an.feedPM;
      const iconHtml = an.imageUrl ? `<img class="ani-thumb" src="${esc(cleanUrl(an.imageUrl))}" alt="${esc(an.name)}" onerror="this.outerHTML='<div class=&quot;ani-emo&quot;>${emo(an.name)}</div>'">` : `<div class="ani-emo">${emo(an.name)}</div>`;
      h+=`<div class="animal-card" onclick="goAnimalView(${an.id})" ontouchstart="tcard(event,${an.id})">
        ${iconHtml}
        <div class="ani-info">
          <div class="ani-name">${esc(an.name)}</div>
          <div class="ani-sub">${hasFeed?"Feed schedule set ✓":"Tap to view & edit"}</div>
        </div>
        <div class="ani-arr">›</div>
      </div>`;
    });
  }
  h+=`<button class="add-btn" onclick="goNewAnimal()">+ Add Animal</button>`;

  // Area notes
  h+=`<div class="divider"></div><div class="sec-h">Area Notes</div>`;
  if(isNotesEdit){
    h+=`<textarea id="area-notes-ta" rows="4" placeholder="Notes, reminders...">${esc(editBuf.notes||"")}</textarea>`;
  } else {
    h+=s.notes
      ?`<div class="area-notes">${esc(s.notes)}</div>`
      :`<div class="empty-box" style="margin-bottom:8px">No area notes</div>`;
    h+=`<button class="btn-edit" style="width:100%;margin-top:4px" onclick="editAreaNotes()">✏️ Edit Area Notes</button>`;
  }

  document.getElementById("area-view").innerHTML=h;
  showPanel("area");
}

function tcard(e,id){e.preventDefault();goAnimalView(id);}
function editAreaNotes(){mode="area-notes-edit";editBuf={notes:store[selArea].notes};renderArea();}
async function saveAreaNotes(){const ta=document.getElementById("area-notes-ta"); if(ta) await saveAreaNotesToSupabase(selArea, ta.value); mode="area"; editBuf={}; renderArea();}
function cancelAreaNotes(){mode="area";editBuf={};renderArea();}

// ── ANIMAL VIEW ────────────────────────────────────────────────────────────────
function getAnimal(id){for(const k of Object.keys(store)){const f=store[k].animals.find(a=>a.id===id);if(f)return f;}return null;}

function goNewAnimal(){
  selAnimalId=null; mode="animal-new";
  editBuf={id:null,name:"",animalType:"HORSE",locName:AREAS[selArea].label,imageUrl:"",feedAM:"",feedPM:"",notes:""};
  imgTab="url"; renderAnimal(); scrollTop();
}

function renderAnimal(){
  const isNew =mode==="animal-new";
  const isEdit=mode==="animal-edit"||isNew;
  const an=isNew?editBuf:(mode==="animal-edit"?editBuf:getAnimal(selAnimalId));
  if(!an)return;
  const areaLabel=AREAS[selArea].label;
  let h="";

  h+=`<div class="back-bar">
    <button class="back-btn" onclick="backFromAnimal()">← ${esc(areaLabel)}</button>
    <div class="view-title" style="text-align:center">${isNew?"New Animal":esc(an.name)}</div>
    ${isEdit
      ?`<div style="display:flex;gap:6px"><button class="btn-save" onclick="saveAnimal()">✓ Save</button><button class="btn-cancel" onclick="cancelAnimal()">✕</button></div>`
      :`<button class="btn-edit" onclick="startEditAnimal()">✏️ Edit</button>`}
  </div>`;

  if(isEdit){
    h+=`<div class="field-lbl">Name</div>
      <input id="an-name" type="text" placeholder="Animal name" value="${esc(an.name||"")}">
      <div class="field-lbl">Animal Type</div>
      <input id="an-type" type="text" placeholder="HORSE, PONY, COW..." value="${esc(an.animalType||"")}">
      <div class="field-lbl">Location</div>
      <select id="an-loc" style="width:100%;background:#182010;border:1px solid #2a3818;color:#d0c080;border-radius:8px;padding:10px 12px;font-size:15px;font-family:Georgia,serif;outline:none;display:block;">
        ${Object.keys(AREAS).map(k=>`<option value="${esc(AREAS[k].label)}" ${((an.locName||areaLabel)===AREAS[k].label)?"selected":""}>${esc(AREAS[k].label)}</option>`).join("")}
      </select>
      <div class="field-lbl" style="margin-top:14px">📷 Photo</div>
      <div class="tab-row">
        <button class="tab${imgTab==="url"?" on":""}" onclick="setImgTab('url')">URL</button>
        <button class="tab${imgTab==="file"?" on":""}" onclick="setImgTab('file')">Upload</button>
      </div>`;
    if(imgTab==="url"){
      h+=`<input id="an-img" type="url" placeholder="https://..." value="${esc(an.imageUrl||"")}">`;
    } else {
      h+=`<button class="btn-file" onclick="document.getElementById('file-input').click()">📁 Choose Photo from iPhone</button>`;
    }
    if(an.imageUrl)h+=`<img src="${esc(cleanUrl(an.imageUrl))}" class="photo-img" style="margin-top:8px" onerror="this.outerHTML='<div class=&quot;photo-ph&quot;>photo could not load</div>'">`;
    h+=`<div class="field-lbl">🌅 AM Feed</div>
      <textarea id="an-am" rows="3" placeholder="Morning feed details...">${esc(an.feedAM||"")}</textarea>
      <div class="field-lbl">🌇 PM Feed</div>
      <textarea id="an-pm" rows="3" placeholder="Evening feed details...">${esc(an.feedPM||"")}</textarea>
      <div class="field-lbl">📝 Notes</div>
      <textarea id="an-notes" rows="3" placeholder="Health, reminders, other info...">${esc(an.notes||"")}</textarea>`;
    if(!isNew)h+=`<div style="margin-top:14px"><button class="btn-del" onclick="deleteAnimal()">🗑 Delete Animal</button></div>`;
  } else {
    // View mode
    if(an.imageUrl){
      h+=`<img src="${esc(cleanUrl(an.imageUrl))}" class="photo-img" onerror="this.outerHTML='<div class=&quot;photo-ph&quot;>photo could not load</div>'">`;
    } else {
      h+=`<div class="photo-ph">no photo — tap Edit to add</div>`;
    }
    h+=`<div class="sec-h">🌅 AM Feed</div>
      <div class="feed-block"><div class="feed-txt">${an.feedAM?esc(an.feedAM):'<span class="feed-none">not set</span>'}</div></div>
      <div class="sec-h">🌇 PM Feed</div>
      <div class="feed-block"><div class="feed-txt">${an.feedPM?esc(an.feedPM):'<span class="feed-none">not set</span>'}</div></div>
      <div class="sec-h">📝 Notes</div>
      <div class="notes-view">${an.notes?esc(an.notes):'<span class="feed-none">no notes</span>'}</div>`;
  }

  document.getElementById("animal-view").innerHTML=h;
  showPanel("animal");
}

function backFromAnimal(){mode="area";editBuf={};renderArea();scrollTop();}
function startEditAnimal(){editBuf=JSON.parse(JSON.stringify(getAnimal(selAnimalId)));mode="animal-edit";imgTab="url";renderAnimal();}
function cancelAnimal(){if(mode==="animal-new"){backFromAnimal();return;}mode="animal-view";editBuf={};renderAnimal();}

async function saveAnimal(){
  collectFields();
  if(!(editBuf.name||"").trim()){alert("Please enter a name.");return;}
  await saveAnimalToSupabase(editBuf, mode==="animal-new" ? null : getAnimal(selAnimalId));
}

async function deleteAnimal(){
  const an=getAnimal(selAnimalId);
  if(!confirm("Delete "+an.name+"?"))return;
  await deleteAnimalFromSupabase(an);
}

function collectFields(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
  editBuf.name=g("an-name"); editBuf.animalType=g("an-type") || "HORSE"; editBuf.locName=g("an-loc") || (AREAS[selArea]&&AREAS[selArea].label) || ""; editBuf.feedAM=g("an-am"); editBuf.feedPM=g("an-pm"); editBuf.notes=g("an-notes");
  const ui=document.getElementById("an-img"); if(ui)editBuf.imageUrl=ui.value;
}

// ── IMAGE ───────────────────────────────────────────────────────────────────────
function setImgTab(t){collectFields();imgTab=t;renderAnimal();}
document.getElementById("file-input").addEventListener("change",function(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{editBuf.imageUrl=ev.target.result;imgTab="url";renderAnimal();};
  r.readAsDataURL(f); this.value="";
});

// ── UTILS ───────────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function emo(n){
  n=(n||"").toLowerCase();
  if(/horse|mare|gelding|pony|keegan|tater|maverick|bravo|pedro|gwen|dandy|tally|jasmine|dallas|dash|emmett|kenai|zander|pandora|maiya|lucy|poppi|annabelle|bailey|bridget|barley/.test(n))return"🐴";
  if(/chicken|hen|rooster|chick/.test(n))return"🐔";
  if(/pig|hog|sow|boar/.test(n))return"🐷";
  if(/cow|bull|calf|cattle|steer/.test(n))return"🐄";
  if(/goat|billy|nanny/.test(n))return"🐐";
  if(/sheep|lamb|ewe|ram/.test(n))return"🐑";
  if(/dog|pup/.test(n))return"🐕";
  if(/duck/.test(n))return"🦆";
  if(/turkey/.test(n))return"🦃";
  return"🐾";
}


// ── SUPABASE DATA LAYER ───────────────────────────────────────────────────────
const SUPABASE_URL = "https://yaaxxeeouwwcmnxuakvt.supabase.co";
const SUPABASE_KEY = "sb_publishable_avuIMUPsZFvGw6np_BGOIg_MJbznewL";
if(!window.supabase){
  alert("Supabase library did not load. Check internet connection or CDN access.");
}
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function norm(s){return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"").trim();}
function cleanUrl(url){
  url = String(url || "").trim();
  if(!url) return "";
  // Remove common accidental suffixes copied from spreadsheet/formula output.
  url = url.replace(/\$0/g, "");
  // Convert Supabase object path to a public object URL if only a bucket path was stored.
  if(url && !/^https?:\/\//i.test(url)){
    url = SUPABASE_URL + "/storage/v1/object/public/Animal_pics/" + encodeURIComponent(url.replace(/^Animal_pics\//,""));
  }
  return url;
}
function areaIdFromLocationName(loc){
  const n=norm(loc);
  return Object.keys(AREAS).find(k=>norm(AREAS[k].label)===n || norm(k)===n) || null;
}
function areaIdForAnimal(animalName, assignments){
  const a=(assignments||[]).find(x=>x.Animal_name===animalName);
  return areaIdFromLocationName(a?.Loc_name) || "barn";
}
function resetStore(){
  const s={};
  Object.keys(AREAS).forEach(k=>s[k]={notes:"",animals:[]});
  return s;
}
function feedText(rows, when){
  return (rows||[])
    .filter(r=>String(r["am/pm"]||"").toLowerCase().includes(when))
    .map(r=>[r.feed_amt,r.feed_type,r.notes].filter(Boolean).join(" - "))
    .filter(Boolean)
    .join("\n");
}
async function loadFromSupabase(){
  document.getElementById("hdr-sub").textContent="loading from Supabase...";
  const [animalsRes, assignRes, feedRes, locRes] = await Promise.all([
    db.from("Animals").select("*").order("Animal_name"),
    db.from("Loc_assignment").select("*"),
    db.from("feed_sched").select("*"),
    db.from("Location").select("*")
  ]);
  const firstError=animalsRes.error||assignRes.error||feedRes.error||locRes.error;
  if(firstError){
    console.error(firstError);
    alert("Supabase load failed: "+firstError.message);
    document.getElementById("hdr-sub").textContent="Supabase load failed";
    return;
  }
  store=resetStore();
  (locRes.data||[]).forEach(l=>{
    const k=areaIdFromLocationName(l.Loc_name);
    if(k) store[k].notes=l.Loc_desc||"";
  });
  nextId=1;
  (animalsRes.data||[]).forEach(row=>{
    const locName=(assignRes.data||[]).find(a=>a.Animal_name===row.Animal_name)?.Loc_name || "";
    const areaId=areaIdForAnimal(row.Animal_name, assignRes.data||[]);
    const feeds=(feedRes.data||[]).filter(f=>f.animal_name===row.Animal_name);
    store[areaId].animals.push({
      id: nextId++,
      dbName: row.Animal_name,
      name: row.Animal_name,
      animalType: row.Animal_type || "HORSE",
      locName: locName || AREAS[areaId].label,
      imageUrl: cleanUrl(row.Pic_url),
      feedAM: feedText(feeds,"am"),
      feedPM: feedText(feeds,"pm"),
      notes: feeds.map(f=>f.notes).filter(Boolean).join("\n")
    });
  });
  buildMap();
  if(mode==="area" && selArea) renderArea();
  else if((mode==="animal-view"||mode==="animal-edit") && selAnimalId) renderAnimal();
  else showPanel("home");
  document.getElementById("hdr-sub").textContent="tap an area to view animals";
}
async function saveAnimalToSupabase(an, oldAn){
  const oldName=oldAn?.dbName || oldAn?.name || null;
  const newName=(an.name||"").trim();
  const locLabel=an.locName || (AREAS[selArea]&&AREAS[selArea].label) || "Barn";
  const payload={Animal_name:newName, Animal_type:an.animalType||"HORSE", Pic_url:cleanUrl(an.imageUrl)};
  let res;
  if(!oldName){
    res=await db.from("Animals").insert(payload);
  }else if(oldName!==newName){
    res=await db.from("Animals").insert(payload);
    if(!res.error){
      await db.from("Loc_assignment").update({Animal_name:newName}).eq("Animal_name",oldName);
      await db.from("feed_sched").update({animal_name:newName}).eq("animal_name",oldName);
      await db.from("Animals").delete().eq("Animal_name",oldName);
    }
  }else{
    res=await db.from("Animals").update({Animal_type:payload.Animal_type, Pic_url:payload.Pic_url}).eq("Animal_name",oldName);
  }
  if(res.error){console.error(res.error); alert("Animal save failed: "+res.error.message); return;}

  await db.from("Loc_assignment").delete().eq("Animal_name",newName);
  if(locLabel) await db.from("Loc_assignment").insert({Animal_name:newName, Loc_name:locLabel});

  await db.from("feed_sched").delete().eq("animal_name",newName);
  const rows=[];
  if((an.feedAM||"").trim()) rows.push({animal_name:newName,"am/pm":"AM",feed_type:an.feedAM,feed_amt:"",notes:an.notes||""});
  if((an.feedPM||"").trim()) rows.push({animal_name:newName,"am/pm":"PM",feed_type:an.feedPM,feed_amt:"",notes:an.notes||""});
  if(rows.length){
    const feedRes=await db.from("feed_sched").insert(rows);
    if(feedRes.error){console.error(feedRes.error); alert("Feed save failed: "+feedRes.error.message); return;}
  }
  await repairMissingAssignments();
await restoreMissingAssignments();
await loadFromSupabase();
  const areaId=areaIdFromLocationName(locLabel) || selArea;
  selArea=areaId;
  const saved=store[areaId].animals.find(x=>x.name===newName);
  selAnimalId=saved?saved.id:null;
  mode="animal-view";
  editBuf={};
  buildMap();
  renderAnimal();
}
async function deleteAnimalFromSupabase(an){
  const name=an.dbName || an.name;
  await db.from("feed_sched").delete().eq("animal_name",name);
  await db.from("Loc_assignment").delete().eq("Animal_name",name);
  const res=await db.from("Animals").delete().eq("Animal_name",name);
  if(res.error){console.error(res.error); alert("Delete failed: "+res.error.message); return;}
  await repairMissingAssignments();
await restoreMissingAssignments();
await loadFromSupabase();
  selAnimalId=null; mode="area"; editBuf={};
  buildMap(); renderArea(); scrollTop();
}
async function saveAreaNotesToSupabase(areaId, notes){
  const locName=AREAS[areaId].label;
  const res=await db.from("Location").upsert({Loc_name:locName, Loc_desc:notes},{onConflict:"Loc_name"});
  if(res.error){console.error(res.error); alert("Area notes save failed: "+res.error.message); return;}
  store[areaId].notes=notes;
}

// ── INIT ────────────────────────────────────────────────────────────────────────
buildMap();
showPanel("home");
loadFromSupabase();
</script>
